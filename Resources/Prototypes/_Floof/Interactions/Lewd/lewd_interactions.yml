# ========================== #
# Sucking
- type: Interaction
  id: LewdSuckPenisOther
  parent: BaseLewdSuckOther
  priority: -1
  delay: 20 # Same as FillPV
  requirement:
    !type:ComplexRequirement
    requirements:
    - *accessibleUnderwearTarget
    - !type:SlotObstructionRequirement &accessibleMouthUser
      checkUser: true
      slot: MASK # Must have accessible mouth
