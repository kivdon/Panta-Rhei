# ========================== #
# Note: when adding new interactions, please consider making them somewhat unqiue in some way.
# We don't need 100 copies of the same interaction that just print out different texts - that's what the subtle chat is for.
# This system is intended to add some gameplay effects to the ERP, not to replace it.
# ========================== #

# ========================== #
# Milking yourself
- type: Interaction
  id: LewdFillContainerBreast
  parent: BaseLewdFillContainer
  priority: 0
  delay: 4 # 4s for self
  requirement:
    !type:ComplexRequirement
    requirements:
    - !type:SlotObstructionRequirement &accessibleUnderwearTarget
      checkUser: false
      slot: INNERCLOTHING # Must have accessible groin/breasts
    - !type:UnderwearRequirement &noTopUndergarmentTarget
      layer: UndergarmentTop
    - !type:SelfTargetRequirement
  action:
    !type:LewdFillContainerFromTarget
      organ: Breasts
      maxAmount: 3
      minRepeatAmount: 2

- type: Interaction
  id: LewdFillContainerPenis
  parent: BaseLewdFillContainer
  priority: 0
  delay: 20 # 20s for self, dumping all 20 units (1 u/s)
  requirement:
    !type:ComplexRequirement
    requirements:
    - *accessibleUnderwearTarget
    - !type:UnderwearRequirement &noBottomUndergarmentTarget
      checkUser: false
      layer: UndergarmentBottom
    - !type:SelfTargetRequirement
  action:
    !type:LewdFillContainerFromTarget
    organ: Penis
    maxAmount: 20
    minRepeatAmount: 5

- type: Interaction
  id: LewdFillContainerVagina
  parent: BaseLewdFillContainer
  priority: 0
  delay: 12 # Idk why you'd want this, I guess for drinks? 12s for self
  requirement:
    !type:ComplexRequirement
    requirements:
    - *accessibleUnderwearTarget
    - *noBottomUndergarmentTarget
    - !type:SelfTargetRequirement
  action:
    !type:LewdFillContainerFromTarget
    organ: Vagina
    maxAmount: 8
    minRepeatAmount: 3


