# ========================== #
# Deposition/filling
- type: Interaction
  id: LewdFillPV
  parent: BaseLewdFillOrgan
  priority: -2
  requirement:
    !type:ComplexRequirement
    requirements:
    - *accessibleUnderwearTarget
    - !type:SlotObstructionRequirement &accessibleUnderwearUser
      checkUser: true
      slot: INNERCLOTHING
    - *noBottomUndergarmentTarget
    - !type:UnderwearRequirement &noBottomUndergarmentUser
      checkUser: false
      layer: UndergarmentBottom
  action:
    !type:LewdOrganFluidTransfer
    donorOrgan: Penis
    receiverOrgan: Vagina

- type: Interaction
  id: LewdFillPR
  parent: BaseLewdFillOrgan
  priority: -2
  requirement:
    !type:ComplexRequirement
    requirements:
    - *accessibleUnderwearTarget
    - *accessibleUnderwearUser
    - *noBottomUndergarmentTarget
    - *noBottomUndergarmentUser
  action:
    !type:LewdOrganFluidTransfer
    donorOrgan: Penis
    receiverOrgan: Rectum


