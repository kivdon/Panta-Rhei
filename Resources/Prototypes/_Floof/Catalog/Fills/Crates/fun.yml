- type: entity
  id: CrateFunSprayPaints
  name: spray paint crate
  description: a crate filled with spray paint.
  parent: CratePlastic
  suffix: Spray Paint
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        # Guaranteed loot
        - id: DeathPaint
          rolls: 2
        - id: DeathPaintTwo
          rolls: 2
        # Occasional pairs of other colors
        - id: SprayPaintBlue
          rolls: 2
          prob: 0.33
        - id: SprayPaintRed
          rolls: 2
          prob: 0.33
        - id: SprayPaintOrange
          rolls: 2
          prob: 0.33
        - id: SprayPaintBlack
          rolls: 2
          prob: 0.33
        - id: SprayPaintGreen
          rolls: 2
          prob: 0.33
        - id: SprayPaintPurple
          rolls: 2
          prob: 0.33
        - id: SprayPaintWhite
          rolls: 2
          prob: 0.33
        # Some additional loot from the maint table
        - !type:NestedSelector
          rolls: 3, 6
          tableId: SprayPaintTable

- type: entity
  id: CrateMysteryKnifeLootbox
  parent: CrateGenericSteel
  name: mystery knife lootbox crate
  description: A crate containing a mystery knife lootbox.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: MysteryKnifeLootbox

- type: entity
  id: CrateMysteryKnifeLootboxBulk
  parent: CrateGenericSteel
  name: bulk mystery knife lootbox crate
  description: A crate containing 10 mystery knife lootboxs.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: MysteryKnifeLootbox
          amount: 10

- type: entity
  id: CrateFunInstrumentsDrumKit
  parent: CrateGenericSteel
  name: drum kit crate
  description: Lay down a beat, and rock on with this crate containing a full drum kit!
  components:
  - type: StorageFill
    contents:
    - id: DrumkitInstrument
