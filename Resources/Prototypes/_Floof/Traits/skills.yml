# =================   General   ====================== #
- type: trait
  id: LightStep
  name: trait-light-step-name
  description: trait-light-step-desc
  category: Skills
  cost: 1 # Minor stealth bonus
  conditions:
  - !type:OneOfSpeciesCondition # These species make no footstep sounds when walking barefoot.
    invert: true
    species:
    - Felinid
    - Tajaran
  effects:
  - !type:AddCompsEffect
    components:
    - type: FootstepVolumeModifier
      volume: -10 # same as EE, makes it 2x quieter

- type: trait
  id: Small
  name: trait-small-name
  description: trait-small-desc
  category: Skills
  cost: 1
  conditions:
  - !type:HasCompCondition
    invert: true  
    component: PseudoItem
  effects:
    - !type:OverrideCompsEffect
      components:
        - type: PseudoItem
          storedOffset: 0,17
          shape:
            - 0,0,1,4
            - 0,2,3,4
            - 4,0,5,4


- type: trait
  id: Tiny
  name: trait-tiny-name
  description: trait-tiny-desc
  category: Skills
  cost: 2
  conditions:
  - !type:HasCompCondition
    invert: true  
    component: PseudoItem
  effects:
    - !type:OverrideCompsEffect
      components:
        - type: PseudoItem
          storedOffset: 0,17
          shape:
            - 0,0,1,4
            - 0,2,3,4
            - 4,0,5,4
        - type: Carriable
          freeHandsRequired: 1 #Default is 2, they are tiny enough to be carried in one hand
          pickupDuration: 2 # Default is 3, plus they will already be lighter. Get scooped.
        - type: BonusMeleeDamage
          damageModifierSet:
            coefficients: #Do less physical damage, because tiny.
              Blunt: 0.9
              Slash: 0.9
              Piercing: 0.9
    #- !type:ModifyStaminaThresholdEffect Possible additional downside. Would probably need to conflict with stamina traits?
    #  multiplier: 0.8

