# ==================== Guns ========================= #
- type: trait # This just adds the Oni shooting malcus to anyone
  id: OniShooting
  name: trait-name-OniShooting
  description: trait-description-OniShooting
  category: Skills
  cost: -6
  conflicts:
  - BadShooting
  conditions:
  - !type:OneOfSpeciesCondition
    invert: true
    species:
    - Oni #already has this
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: PlayerAccuracyModifier
      spreadMultiplier: 7.5
      maxSpreadAngle: 90

- type: trait
  id: BadShooting
  name: trait-name-BadShooting
  description: trait-description-BadShooting
  category: Skills
  cost: -2
  conflicts:
  - OniShooting
  conditions:
  - !type:OneOfSpeciesCondition
    invert: true
    species:
    - Oni #already has this
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: PlayerAccuracyModifier
      spreadMultiplier: 2.5
      maxSpreadAngle: 90
