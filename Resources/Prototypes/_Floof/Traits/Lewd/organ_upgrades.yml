# ==================== #
# +20u deposition capacity
- type: trait
  id: LewdDepositionCapacity20
  name: trait-deposition-capacity-20-name
  description: trait-deposition-capacity-20-desc
  category: Lewd
  cost: 0
  usesSlots: false
  conflicts:
  - LewdDepositionCapacity40
  effects:
  - !type:ModifyLewdOrgansEffect
    target: # Only these two support deposition
    - Vagina
    - Rectum
    depositionCapacityBonus: 20

# +40u deposition capacity
- type: trait
