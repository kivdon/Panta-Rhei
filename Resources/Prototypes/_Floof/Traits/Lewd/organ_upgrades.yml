# These traits improve the lewd organs at a tiny cost.
# 2x prod
- type: trait
  id: DoubleLewdProduction
  name: trait-double-production-name
  description: trait-double-production-desc
  category: Lewd
  cost: 0
  usesSlots: false
  conflicts:
  - QuadrupleLewdProduction
  effects:
  - !type:ModifyLewdOrgansEffect
    target: All # Todo: specialized traits?
    productionMultiplier: 2

# 4x prod
- type: trait
  id: QuadrupleLewdProduction
  name: trait-quadruple-production-name
  description: trait-quadruple-production-desc
  category: Lewd
  cost: 1
  usesSlots: false
  conflicts:
  - DoubleLewdProduction
  effects:
  - !type:ModifyLewdOrgansEffect
    target: All
    productionMultiplier: 4


