- type: entity
  name: Vector-S
  suffix: Admeme
  parent: [BaseWeaponSubMachineGun, BaseMajorContraband]
  id: WeaponSubMachineGunRealVector
  description: An old sol-made PDW. With an insane fire-rate and low recoil. Uses .45 magnum ammo. Jesus this thing is wild.
  components:
  - type: Sprite
    sprite: _Floof/Objects/Weapons/Guns/SMGs/vector.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Floof/Objects/Weapons/Guns/SMGs/vector.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -16
    maxAngle: -19
  - type: Gun
    minAngle: 21
    maxAngle: 32
    fireRate: 1200
    burstFireRate: 240
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
    selectedMode: Burst
    availableModes:
    - Burst
    - SemiAuto
    - FullAuto
    shotsPerBurst: 2
    burstCooldown: 0.255
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineMagnumSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineMagnumSubMachineGun
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeMagnum
        priority: 1
        whitelist:
          tags:
          - CartridgeMagnum
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

