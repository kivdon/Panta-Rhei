# Misc

# Baking

- type: entity
  name: frosting
  parent: FoodBakingBase
  id: FoodFrosting
  description: Soft, creamy, and sweet. Used for topping cakes.
  components:
  - type: Stack
    stackType: Frosting
    count: 1
  - type: Sprite
    sprite: _Floof/Objects/Consumable/Food/ingredients.rsi
    state: frosting-pipe
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 24
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Sugar
          Quantity: 15

- type: entity
  name: cheese slice
  parent: FoodBakingBase
  id: FoodSliceOfCheese
  description: A nice slice of cheese. Would be a shame if this landed on someones face.
  components:
  - type: Item
    shape:
    - 0,0,0,0 # small size in inventories
  - type: FlavorProfile
    flavors:
    - cheesy
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 6
        reagents:
        - ReagentId: Nutriment
          Quantity: 1.66 # This is the amount you get if you cut a cheese wedge
  - type: Tag
    tags:
    - Slice
  - type: FoodSequenceElement # for burger and taco stacks
    entries:
      Taco: CheeseTaco
      Burger: CheeseBurger
  - type: Sprite
    sprite: _Floof/Objects/Specific/Kitchen/cheese_slice.rsi
    scale: 0.5, 0.5 # make the spite much smaller
    state: cheeseslice
  - type: EmbeddableProjectile
    sound: /Audio/Effects/pop.ogg
    embedOnThrow: True
    offset: "0,-0.1"
  - type: ThrowingAngle
    angle: 0
  - type: LandAtCursor

- type: entity
  parent: FoodMeatRawBase
  id: FoodMeatPork
  name: raw pork
  description: A slab of fatty raw meat.
  components:
  - type: Sprite
    state: plain
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 6
        - ReagentId: Fat
          Quantity: 15
  - type: SliceableFood
    count: 3
    slice: FoodMeatBacon
  - type: InternalTemperature
    conductivity: 0.43
  - type: Construction
    graph: MeatSteak # when someone makes cooked pork change this
    node: start
    defaultTarget: meat steak
  - type: Tag
    tags:
    - Meat
  - type: Item
    storedOffset: -2,1
    inhandVisuals:
      left:
      - state: plain-inhand-left
      right:
      - state: plain-inhand-right
