- type: job
  id: Chemist
  name: job-name-chemist
  description: job-description-chemist
  playTimeTracker: JobChemist
  antagAdvantage: 4 # DeltaV - Synthesize any chem you want with little oversight.
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 5h
  startingGear: ChemistGear
  icon: "JobIconChemist"
  supervisors: job-supervisors-cmo
  access:
  - Medical
  - Chemistry
  - Maintenance
  special:
  # Begin Floof Surgery Additions
  - !type:AddComponentSpecial # Shitmed change
    components:
    - type: SurgerySpeedModifier
      speedModifier: 1.1
  # End Floof Surgery Additions

- type: startingGear
  id: ChemistGear
  equipment:
    #id: ChemistryPDA # DeltaV - Choose a PDA from the loadouts
    ears: ClothingHeadsetMedical
    belt: ChemBag
    pocket1: HandLabeler
    #eyes: ClothingEyesGlassesChemical # Floofstation - let loadouts handle eye wear
  #storage:
    #back:
    #- Stuff

- type: chameleonOutfit
  id: ChemistChameleonOutfit
  job: Chemist
  equipment:
    head: ClothingHeadHatBeretMedic
    mask: ClothingMaskSterile
    neck: ClothingNeckStethoscope
    outerClothing: ClothingOuterCoatLabChem
    gloves: ClothingHandsGlovesLatex
