- type: job
  id: MedicalDoctor
  name: job-name-doctor
  description: job-description-doctor
  playTimeTracker: JobMedicalDoctor
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 2.5h
  startingGear: DoctorGear
  icon: "JobIconMedicalDoctor"
  supervisors: job-supervisors-cmo
  access:
  - Medical
  - Maintenance
  extendedAccess:
  - Chemistry
  # Begin DeltaV Additions
  - Paramedic # Add Paramedic access
  - Surgery # Add Surgery access
  # End DeltaV Additions
  special:
  - !type:GiveItemOnHolidaySpecial
    holiday: DoctorDay
    prototype: WehMedipen
  # Begin Floof Surgery Additions
  - !type:AddComponentSpecial # Shitmed change
    components:
    - type: SurgerySpeedModifier
      speedModifier: 1.4
  # End Floof Surgery Additions


- type: startingGear
  id: DoctorGear
  equipment:
    ears: ClothingHeadsetMedical
    #belt: ClothingBeltMedicalFilled # Floofstation - disabled this since they can choose between belts in loadout
  # Begin DeltaV additions
  storage:
    back:
    #- Stuff
    - Syringe
  # End DeltaV additions

- type: chameleonOutfit
  id: MedicalDoctorChameleonOutfit
  job: MedicalDoctor
  equipment:
    head: ClothingHeadNurseHat
    eyes: ClothingEyesHudMedical
    mask: ClothingMaskSterile
    neck: ClothingNeckStethoscope
    outerClothing: ClothingOuterCoatLab
    gloves: ClothingHandsGlovesLatex
