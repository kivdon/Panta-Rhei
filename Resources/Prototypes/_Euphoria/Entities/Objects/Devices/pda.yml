  description: Refurbished standard PDA
  components:
  - type: Sprite
    sprite: _Floof/Objects/Devices/pda.rsi
  - type: Icon
    sprite: _Floof/Objects/Devices/pda.rsi # DeltaV aPDA Resprite File Path
    state: pda-free
  - type: Pda
    id: FreelancerIDCard
  - type: PdaBorderColor
    borderColor: "#668643"

#PDA for sapient animals
- type: entity
  parent: BasePDA
  id: AnimalPDA
  name: Beast PDA
  description: For non-human crew. A coordinate switch has been soldered onto the open circuits.
  components:
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-zookeeper
  - type: Icon
    state: pda-zookeeper
  - type: Pda
    id: VisitorIDCard
  - type: PdaBorderColor
    borderColor: "#ffe685"
  - type: SuitSensor
    activationSlot: "pda"
    randomMode: false
    mode: SensorCords
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensor
  - type: WirelessNetworkConnection
    range: 1200
  - type: StationLimitedNetwork

# =========== Alternative PDAs ==============

# Alternative PDA base
- type: entity
  parent: BasePDA
  id: BaseAlternativePDA
  name: Base Alternative PDA
  description: Personal Data Assistant.
  components:
  - type: Pda
    id: PassengerIDCard
  - type: Sprite
    sprite: _Floof/Objects/Devices/alternative_head_pda.rsi
    state: pda
    scale: 1.02, 1.02 # increase the scale to match the size of delta-v pdas
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      offset: 0.1, 0.0 # 1.5 is WAY TOO FUCKING FAR, like in the next universe far
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      offset: 0.11, 0.1 # 0.125 is too far to the right
      shader: "unshaded"
      visible: false
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda
  - type: Icon
    sprite: _Floof/Objects/Devices/alternative_head_pda.rsi
    state: pda
  - type: CartridgeLoader # Nyanotrasen - Glimmer Monitor
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - NanoChatCartridge

