- type: entity
  parent: ClothingOuterStorageBase
  id: ClothingOuterCoatIdrisIncorporatedWindbreaker
  name: idris incorporated windbreaker
  description: A windbreaker, sporting the official heraldry of the Idris Incorporated Corporate Finances division. Its made of sturdy futuristic fiber.
  components:
  - type: Sprite
    sprite: _EE/Clothing/OuterClothing/WinterCoats/CorpoJackets/idris_windbreaker.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
  - type: Clothing
    sprite: _EE/Clothing/OuterClothing/WinterCoats/CorpoJackets/idris_windbreaker.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
      - state: equipped-OUTERCLOTHING-unshaded
        shader: unshaded
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.95 # match other coats protection values
        Heat: 0.9
