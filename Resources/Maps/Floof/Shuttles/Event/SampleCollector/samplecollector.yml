  entities:
  - uid: 480
    components:
    - type: MetaData
      name: Preflight Check
    - type: Transform
      pos: 6.480268,-0.5600879
      parent: 2
    - type: Paper
      content: >-
        [head=3]Before approaching a station:[/head]


        Please take a moment to ensure that the frequently used doors have a fresh coat of paint. You are free to paint them however you like.


        Suggested colours:


        Self service room airlocks - Medical

        Engineering airlock - Engineering

        Cockpit airlock - Basic
- proto: PaperDyedPurple
  entities:
  - uid: 467
    components:
    - type: Transform
      pos: 0.7562344,-2.4637074
      parent: 2
    - type: Paper
      stampState: paper_stamp-wizard
      stampedBy:
      - stampedColor: '#881BC1FF'
        stampedName: HypnoTech Division of Medical Services
      content: >2-
                                                  [head=2]HTDMS[/head]
                             [head=3]Biological Sample Collection[/head]

        [head=3]The Job[/head]

        You've been contracted to collect biological samples to provide to HypnoTech's client companies for research purposes. Chain of custody is important so you are only authorized to purchase samples collected on your own ship. You are not an employee of HypnoTech and are just contracted for the length of this job.


        You may purchase up to 100 units of each type of sample from any one person. Please catalogue who the samples were from and store them in the provided fridge. If someone donates 100 units of their blood, they can also donate 100 units of their own milk. They can not donate 200 units of blood.


        The suggested rate is 10 spesos per a unit of a sample, but you are free to arrange pricing depending on the situation. A maximum budget of $30k spesos has been placed in secure lock up in the staff room. Attempt to maximize the amount of samples you get for the spesos you've been provided.


        You are only required to assist in the taking of blood samples. Assisting in the collection of any other kind is at your discretion.


        [head=3]The Ship[/head]

        You have been provided an HTMS Sample Transport ship for use during the length of your contract for this job. There is an open area to be utilized for blood draws and enclosed rooms that allow patient privacy for the extraction of any other kind of sample. The staff room has your equipment, stock for refills, and changes of uniform. A secure lock up is provided for the funds for this job, do not lose these. Return of the ship in one piece is part of your contract. You may incentivize station crew to repair your ship with whatever means you have, including job funds.


        [head=3]In Case of Questions[/head]

        If potential sellers ask why the samples are being collected let them know that it is for matters of research. These samples are being provided to various research focused companies and are not being utilized by HypnoTech directly. We are simply collecting and transporting these samples.


        We take client confidentiality seriously so the exact nature of these studies and the names of client companies are not subject to disclosure.


        Have fun and enjoy your temporary contract with HypnoTech!





        [head=2]HypnoTech[/head]

        [italic][head=3]Making work a dream![/head][/italic]
